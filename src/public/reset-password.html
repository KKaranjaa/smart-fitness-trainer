<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Smart Fitness Trainer</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
            background: linear-gradient(135deg, #02C39A, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }

        button.primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #02C39A, #028090);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        button.primary:hover {
            opacity: 0.9;
        }

        .alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
        }

        .alert-success {
            background: rgba(2, 195, 154, 0.1);
            border: 1px solid rgba(2, 195, 154, 0.3);
            color: #02C39A;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <header>
            <h1>Reset Password</h1>
            <p>Please enter your new password below.</p>
        </header>

        <div id="alert" class="alert"></div>

        <form id="resetForm">
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••" required>
            </div>

            <button type="submit" class="primary" id="resetBtn">Update Password</button>
        </form>

        <div id="successOptions" style="display: none; text-align: center; margin-top: 20px;">
            <a href="/login.html" style="color: #02C39A; text-decoration: none; font-weight: 600;">Go to Login</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('resetForm');
        const alertDiv = document.getElementById('alert');
        const resetBtn = document.getElementById('resetBtn');
        const successOptions = document.getElementById('successOptions');

        // Extract token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            alertDiv.textContent = 'Invalid or missing reset token.';
            alertDiv.className = 'alert alert-error';
            alertDiv.style.display = 'block';
            form.style.display = 'none';
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alertDiv.textContent = 'Passwords do not match.';
                alertDiv.className = 'alert alert-error';
                alertDiv.style.display = 'block';
                return;
            }

            resetBtn.disabled = true;
            resetBtn.textContent = 'Updating...';

            try {
                const response = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    alertDiv.textContent = data.message;
                    alertDiv.className = 'alert alert-success';
                    alertDiv.style.display = 'block';
                    form.style.display = 'none';
                    successOptions.style.display = 'block';
                } else {
                    alertDiv.textContent = data.message;
                    alertDiv.className = 'alert alert-error';
                    alertDiv.style.display = 'block';
                }

            } catch (err) {
                alert('Connection error');
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Update Password';
            }
        });
    </script>
</body>

</html>
