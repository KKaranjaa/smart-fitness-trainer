<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Messages – Smart Fitness Trainer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="/socket.io/socket.io.js"></script>
  <script>
    (function() {
      const user = JSON.parse(localStorage.getItem('user'));
      if (!user) window.location.href = '/login.html';
    })();
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1923;
      --surface:   #1a2535;
      --elevated:  #243044;
      --border:    rgba(255,255,255,0.07);
      --accent:    #02C39A;
      --blue:      #3b82f6;
      --text:      #f1f5f9;
      --muted:     #64748b;
      --bubble-in: #1e3a5f;   /* trainer — left */
      --bubble-out:#164033;   /* member — right */
      --sidebar-w: 300px;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Top bar ── */
    .topbar {
      height: 56px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 14px;
      flex-shrink: 0;
      z-index: 10;
    }
    .topbar a { color: var(--muted); text-decoration: none; font-size: 0.85rem; font-weight: 600; }
    .topbar a:hover { color: var(--accent); }
    .topbar-title { font-weight: 700; font-size: 1rem; flex: 1; }
    .trainer-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #028090);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.85rem; color: white; flex-shrink: 0;
    }

    /* ── Body layout ── */
    .chat-layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Messages list ── */
    .messages-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Chat header */
    .chat-header {
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .chat-header-info h3 { font-size: 0.95rem; font-weight: 700; margin-bottom: 2px; }
    .chat-header-info span { font-size: 0.75rem; color: var(--accent); font-weight: 600; }

    /* Scroll area */
    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }
    .chat-scroll::-webkit-scrollbar { width: 4px; }
    .chat-scroll::-webkit-scrollbar-thumb { background: var(--elevated); border-radius: 4px; }

    /* Date dividers */
    .date-divider {
      text-align: center;
      margin: 12px 0 6px;
    }
    .date-divider span {
      background: var(--elevated);
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 14px;
      border-radius: 20px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* Bubbles */
    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      max-width: 85%;
      animation: popIn 0.2s ease-out;
    }
    @keyframes popIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    @media (min-width: 768px) {
        .bubble-row { max-width: 70%; }
    }

    .bubble-row.trainer { align-self: flex-start; }
    .bubble-row.member  { align-self: flex-end; flex-direction: row-reverse; }

    .bubble-avatar {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; font-weight: 800; color: white;
    }
    .bubble-row.trainer .bubble-avatar { background: linear-gradient(135deg, var(--accent), #028090); }
    .bubble-row.member  .bubble-avatar { background: linear-gradient(135deg, var(--blue), #6366f1); }

    .bubble {
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 0.9rem;
      line-height: 1.5;
      max-width: 100%;
      word-break: break-word;
      position: relative;
    }
    .bubble-row.trainer .bubble {
      background: var(--bubble-in);
      border-bottom-left-radius: 4px;
      color: #cbd5e1;
    }
    .bubble-row.member .bubble {
      background: var(--bubble-out);
      border-bottom-right-radius: 4px;
      color: #d1fae5;
    }
    .bubble-time {
      font-size: 0.6rem;
      color: var(--muted);
      margin-top: 4px;
      display: block;
      text-align: right;
    }
    .bubble-row.trainer .bubble-time { text-align: left; }

    /* Sent indicator */
    .tick { font-size: 0.65rem; margin-left: 4px; }
    .tick.read { color: var(--accent); }
    .tick.unread { color: var(--muted); }

    /* Empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 12px;
      font-size: 0.9rem;
      padding: 20px;
    }
    .empty-state .big-icon { font-size: 2.5rem; }

    /* ── Input ── */
    .input-bar {
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 10px;
      flex-shrink: 0;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    .input-bar textarea {
      flex: 1;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 16px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      resize: none;
      min-height: 40px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      overflow-y: auto;
    }
    .input-bar textarea:focus { border-color: var(--accent); }
    .input-bar textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent);
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      font-size: 1rem;
      transition: transform 0.15s, background 0.2s;
    }
    .send-btn:hover { transform: scale(1.05); background: #028090; }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Typing dots */
    .typing-indicator { display: none; align-items: center; gap: 5px; padding: 0 16px 8px; }
    .typing-indicator span { font-size: 0.75rem; color: var(--muted); }
    .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    @media (max-width: 480px) {
        .chat-header { padding: 10px 16px; }
        .chat-scroll { padding: 15px 16px; }
        .topbar { padding: 0 16px; }
        .bubble-avatar { display: none; }
        .bubble-row { max-width: 90%; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--elevated); border-radius: 3px; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div class="topbar">
    <a href="/">← Home</a>
    <span class="topbar-title">💬 Messages</span>
    <span id="onlineStatus" style="font-size:0.75rem; color:var(--accent); font-weight:600;">● Online</span>
  </div>

  <div class="chat-layout">
    <!-- Chat Panel -->
    <div class="messages-area">

      <!-- Chat Header -->
      <div class="chat-header">
        <div class="trainer-avatar">EM</div>
        <div class="chat-header-info">
          <h3>Eugene Mogare</h3>
          <span>Your Personal Trainer</span>
        </div>
      </div>

      <!-- Messages Scroll Area -->
      <div class="chat-scroll" id="chatScroll">
        <div class="empty-state" id="emptyState">
          <span class="big-icon">💬</span>
          <strong>No messages yet</strong>
          <p style="font-size:0.85rem; max-width:260px; text-align:center;">Your trainer will send you tips, motivation, and check-ins here.</p>
        </div>
      </div>

      <!-- Typing indicator -->
      <div class="typing-indicator" id="typingIndicator">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        <span>Trainer is typing…</span>
      </div>

      <!-- Input Bar -->
      <div class="input-bar">
        <textarea id="msgInput" placeholder="Reply to your trainer…" rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendReply()" title="Send">➤</button>
      </div>
    </div>
  </div>

  <script>
    const sessionUser = JSON.parse(localStorage.getItem('user'));
    const userId   = sessionUser ? sessionUser.userId : null;
    const userName = sessionUser ? sessionUser.name   : 'Member';
    let messages   = [];
    let pollTimer  = null;

    // ── Socket.io (fast-path for instant delivery) ──────────────────────
    const socket = io();

    socket.on('connect', () => {
      console.log('[Socket] Member connected:', socket.id);
      socket.emit('join', { userId });
    });

    // Socket: trainer sends → notify us to refresh
    socket.on('new_message', (msg) => {
      if (msg.toUserId === userId && msg.fromRole === 'trainer') fetchMessages();
    });

    // Typing indicators
    socket.on('user_typing',      () => { document.getElementById('typingIndicator').style.display = 'flex'; });
    socket.on('user_stop_typing', () => { document.getElementById('typingIndicator').style.display = 'none'; });

    // ── Helpers ─────────────────────────────────────────────────────
    function formatTime(d) {
      return new Date(d).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    function formatDate(d) {
      const dt = new Date(d), today = new Date();
      const yest = new Date(today); yest.setDate(today.getDate() - 1);
      if (dt.toDateString() === today.toDateString()) return 'Today';
      if (dt.toDateString() === yest.toDateString()) return 'Yesterday';
      return dt.toLocaleDateString([], { weekday: 'long', month: 'short', day: 'numeric' });
    }
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }
    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
    }
    let typingTimeout = null;
    function handleKey(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendReply(); return; }
      socket.emit('typing', { fromRole: 'member', toUserId: userId });
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit('stop_typing', { fromRole: 'member', toUserId: userId }), 1500);
    }

    // ── Render ───────────────────────────────────────────────────────────────
    function renderMessages(msgs) {
      const scroll = document.getElementById('chatScroll');
      const empty  = document.getElementById('emptyState');
      const wasAtBottom = scroll.scrollHeight - scroll.scrollTop - scroll.clientHeight < 80;

      if (!msgs.length) { empty.style.display = 'flex'; return; }
      empty.style.display = 'none';

      let html = '', lastDate = '';
      msgs.forEach(m => {
        const dateLabel = formatDate(m.sentAt);
        if (dateLabel !== lastDate) {
          html += `<div class="date-divider"><span>${dateLabel}</span></div>`;
          lastDate = dateLabel;
        }
        const fromTrainer = m.fromRole === 'trainer';
        const initials    = fromTrainer ? 'EM' : userName.charAt(0).toUpperCase();
        const side        = fromTrainer ? 'trainer' : 'member';
        const tick = !fromTrainer ? `<span class="tick ${m.read ? 'read' : 'unread'}">&#10003;&#10003;</span>` : '';
        html += `<div class="bubble-row ${side}">
          <div class="bubble-avatar">${initials}</div>
          <div>
            <div class="bubble">${escapeHtml(m.body)}</div>
            <span class="bubble-time">${formatTime(m.sentAt)} ${tick}</span>
          </div>
        </div>`;
      });
      scroll.innerHTML = html;
      if (wasAtBottom || msgs.length !== messages.length) scroll.scrollTop = scroll.scrollHeight;
      messages = msgs;
    }

    // ── Fetch (REST — always reliable) ──────────────────────────────────────────
    async function fetchMessages() {
      if (!userId) return;
      try {
        const r = await fetch('/api/messages/' + userId, { cache: 'no-store' });
        const d = await r.json();
        renderMessages(d.data || []);
      } catch(e) { console.error('Fetch error', e); }
    }

    // ── Send via REST + notify trainer via socket ──────────────────────────
    async function sendReply() {
      const input = document.getElementById('msgInput');
      const body  = input.value.trim();
      if (!body || !userId) return;

      const btn = document.getElementById('sendBtn');
      btn.disabled = true;
      input.value  = '';
      input.style.height = 'auto';

      try {
        // Save to DB via REST (guaranteed)
        await fetch('/api/messages/reply', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userId, body })
        });
        // Refresh our own view
        await fetchMessages();
        // Ping trainer via socket (no DB save — REST already saved)
        socket.emit('notify_trainer', { toUserId: userId });
        socket.emit('stop_typing', { fromRole: 'member', toUserId: userId });
      } catch(e) {
        console.error('Send error:', e);
      } finally {
        btn.disabled = false;
        input.focus();
      }
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    window.onload = () => {
      fetchMessages();
      // Polling every 3s as a reliable fallback in case socket events fail
      pollTimer = setInterval(fetchMessages, 3000);
    };
    window.onbeforeunload = () => clearInterval(pollTimer);
  </script>
</body>
</html>
