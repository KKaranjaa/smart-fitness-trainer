<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Smart Fitness Trainer</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0;
            background: linear-gradient(135deg, #02C39A, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
        }

        button.primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #02C39A, #028090);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        button.primary:hover {
            opacity: 0.9;
        }

        .role-hint {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .role-hint a {
            color: #02C39A;
            text-decoration: none;
            font-weight: 600;
        }

        .alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            display: none;
        }

        .alert-success {
            background: rgba(2, 195, 154, 0.1);
            border: 1px solid rgba(2, 195, 154, 0.3);
            color: #02C39A;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <header>
            <h1>Forgot Password</h1>
            <p>Enter your email address and we'll send you a link to reset your password.</p>
        </header>

        <div id="alert" class="alert alert-success"></div>

        <form id="forgotForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="eugenemogare@gym.com" required>
            </div>

            <button type="submit" class="primary" id="resetBtn">Send Reset Link</button>
        </form>

        <p class="role-hint">Remember your password? <a href="/login.html">Sign In</a></p>
    </div>

    <script>
        const form = document.getElementById('forgotForm');
        const alertDiv = document.getElementById('alert');
        const resetBtn = document.getElementById('resetBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            resetBtn.disabled = true;
            resetBtn.textContent = 'Sending...';

            try {
                const response = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                
                alertDiv.textContent = data.message;
                alertDiv.style.display = 'block';
                form.style.display = 'none';

            } catch (err) {
                alert('Connection error');
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Send Reset Link';
            }
        });
    </script>
</body>

</html>
