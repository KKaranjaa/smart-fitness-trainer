<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Fitness Trainer</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            margin: 20px;
        }

        @media (min-width: 640px) {
            .login-card { padding: 40px; }
        }

        @media (max-width: 400px) {
            .login-card { border-radius: 0; border: none; background: transparent; backdrop-filter: none; box-shadow: none; padding: 20px; margin: 0; }
            body { background: #0f172a; }
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: clamp(1.25rem, 6vw, 1.5rem);
            margin: 0;
            background: linear-gradient(135deg, #02C39A, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #02C39A; }

        button.primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #02C39A, #028090);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            font-size: 1rem;
            transition: opacity 0.2s, transform 0.1s;
        }

        button.primary:hover { opacity: 0.9; }
        button.primary:active { transform: scale(0.98); }

        .role-hint {
            text-align: center;
            margin-top: 25px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .role-hint a {
            color: #02C39A;
            text-decoration: none;
            font-weight: 600;
        }

        .trainer-mode {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 12px;
            border-radius: 12px;
            margin-top: 24px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>

<body>

    <div class="login-card">
        <header>
            <h1>Smart Fitness Login</h1>
        </header>

        <form id="loginForm">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="eugenemogare@gym.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <div style="text-align: right; margin-top: 5px;">
                    <a href="/forgot-password.html" style="color: #02C39A; text-decoration: none; font-size: 0.75rem; font-weight: 600;">Forgot Password?</a>
                </div>
            </div>

            <button type="submit" class="primary" id="loginBtn">Sign In</button>
        </form>

        <p class="role-hint">New here? <a href="/register.html">Join the Gym</a></p>



        <script>
            const form = document.getElementById('loginForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const loginBtn = document.getElementById('loginBtn');

                loginBtn.disabled = true;
                loginBtn.textContent = 'Logging in...';

                try {
                    const password = document.getElementById('password').value;
                    const response = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email, password })
                    });

                    const data = await response.json();
                    if (data.status === 'success') {
                        // Store Session
                        localStorage.setItem('user', JSON.stringify(data.data));

                        // Redirect based on role
                        if (data.data.role === 'trainer') {
                            window.location.href = '/dashboard.html';
                        } else {
                            window.location.href = '/';
                        }
                    } else {
                        if (data.verificationPending) {
                            alert('Account Not Verified: Please check your email and click the verification link to activate your gym membership.');
                        } else {
                            alert(data.message || 'Login failed. Check your email and password.');
                        }
                    }
                } catch (err) {
                    alert('Connection error');
                } finally {
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                }
            });
        </script>
</body>

</html>
