<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join the Gym - Smart Fitness Trainer</title>
    <link rel="stylesheet" href="/css/design-system.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background: radial-gradient(circle at top right, #1a1a2e, #16213e, #0f3460);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        header h1 {
            font-size: 1.5rem;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #02C39A, #3b82f6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.6);
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-family: inherit;
            box-sizing: border-box;
            cursor: pointer;
        }

        select option {
            background: #0f172a;
            color: white;
        }

        button.primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #02C39A, #028090);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            transition: opacity 0.2s;
        }

        button.primary:hover { opacity: 0.9; }
        .hint { text-align: center; margin-top: 20px; font-size: 0.85rem; color: rgba(255,255,255,0.5); }
        .hint a { color: #02C39A; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
    <div class="card">
        <header>
            <h1>Create Account</h1>
        </header>

        <form id="regForm">
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required>
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="john@example.com" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                <div class="input-group" style="margin-bottom:0;">
                    <label>Weight (kg)</label>
                    <input type="number" id="weight" placeholder="70" required>
                </div>
                <div class="input-group" style="margin-bottom:0;">
                    <label>Height (cm)</label>
                    <input type="number" id="height" placeholder="175" required>
                </div>
            </div>

            <div class="input-group">
                <label>Fitness Goals</label>
                <textarea id="fitnessGoals" placeholder="e.g. Weight loss, Muscle gain..." required style="width:100%; padding:12px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:12px; color:white; min-height:80px;"></textarea>
            </div>

            <div class="input-group">
                <label>Fitness Level</label>
                <select id="fitnessLevel">
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>
            </div>

            <button type="submit" class="primary" id="submitBtn">Become a Member</button>
        </form>

        <p class="hint">Already a member? <a href="/login.html">Sign In</a></p>
    </div>

    <script>
        const form = document.getElementById('regForm');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                weight: parseInt(document.getElementById('weight').value),
                height: parseInt(document.getElementById('height').value),
                fitnessGoals: document.getElementById('fitnessGoals').value,
                fitnessLevel: document.getElementById('fitnessLevel').value
            };
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Joining...';

            try {
                const r = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const d = await r.json();
                if (d.status === 'success' && d.data.verificationRequired) {
                    document.getElementById('regForm').style.display = 'none';
                    document.querySelector('header h1').textContent = 'Check Your Email';
                    const msg = document.createElement('div');
                    msg.innerHTML = `<p style="text-align:center; padding:20px; color:rgba(255,255,255,0.7); line-height:1.6;">We've sent a verification link to <strong>${payload.email}</strong>. <br><br>Please click the link in your email to activate your account and start your fitness journey!</p>`;
                    document.querySelector('.card').insertBefore(msg, document.querySelector('.hint'));
                    btn.style.display = 'none';
                } else if (d.status === 'success') {
                    localStorage.setItem('user', JSON.stringify(d.data));
                    window.location.href = '/';
                } else {
                    alert(d.message);
                    btn.disabled = false;
                    btn.textContent = 'Become a Member';
                }
            } catch (err) { alert('Registration failed.'); }
            finally { btn.disabled = false; btn.textContent = 'Become a Member'; }
        });
    </script>
</body>
</html>
